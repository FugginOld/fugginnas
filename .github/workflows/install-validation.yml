name: Install Validation

on:
  pull_request:
    paths:
      - "install.sh"
      - "requirements.txt"
      - "tests/test_install_sh.py"
      - "tests/runtime_validate_install_in_container.sh"
      - ".github/workflows/install-validation.yml"
  push:
    branches:
      - main
    paths:
      - "install.sh"
      - "requirements.txt"
      - "tests/test_install_sh.py"
      - "tests/runtime_validate_install_in_container.sh"
      - ".github/workflows/install-validation.yml"

jobs:
  install-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run install.sh unit tests
        run: python -m pytest -q tests/test_install_sh.py

      - name: Run install.sh runtime validation in Debian container
        # Runs real apt-get + pip inside Debian 12 — takes ~2–3 min on first run
        timeout-minutes: 10
        run: docker run --rm -v "$PWD:/repo" -w /repo debian:12 bash ./tests/runtime_validate_install_in_container.sh

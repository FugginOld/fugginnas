name: SSE Guardrails

on:
  pull_request:
    paths:
      - "system/sse.py"
      - "routes/apply.py"
      - "routes/nonraid.py"
      - "tests/test_sse_stream.py"
      - "tests/test_architecture_guards.py"
      - ".github/workflows/sse-guardrails.yml"
  push:
    branches:
      - main
    paths:
      - "system/sse.py"
      - "routes/apply.py"
      - "routes/nonraid.py"
      - "tests/test_sse_stream.py"
      - "tests/test_architecture_guards.py"
      - ".github/workflows/sse-guardrails.yml"

jobs:
  sse-guardrails:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run helper contract + architecture guard tests
        run: python -m pytest -q tests/test_sse_stream.py tests/test_architecture_guards.py
